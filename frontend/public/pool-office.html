<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Qhunu Agent Office</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a2e;font-family:"Courier New",monospace;overflow:hidden;}
#root{width:100vw;height:100vh;display:flex;flex-direction:column;}
#hdr{background:#12121e;padding:7px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #22223a;flex-shrink:0;height:36px;}
#main{display:flex;flex:1;overflow:hidden;}
#cw{flex:1;position:relative;overflow:hidden;}
canvas{position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges;}
#side{width:190px;background:#0c0c18;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.s{border-bottom:1px solid #18182e;padding:6px 9px;}
.st{font-size:9px;color:#3a4560;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.ac{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid #0f0f24;}
.ac:last-child{border-bottom:none;}
.av{width:16px;height:16px;border-radius:3px;font-size:7px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.an{font-size:10px;font-weight:700;}
.at{font-size:7px;color:#6a7a8a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.sp{font-size:6px;padding:1px 4px;border-radius:6px;flex-shrink:0;}
.mr{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.ml{font-size:9px;color:#445060;}
.mv{font-size:10px;font-weight:700;font-family:monospace;}
#bot{background:#080810;border-top:2px solid #18182e;height:24px;display:flex;align-items:center;padding:0 12px;gap:8px;overflow:hidden;flex-shrink:0;}
@keyframes pp{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
</style>
</head>
<body>
<div id="root">
<div id="hdr">
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pp 1.5s infinite;"></div>
    <span style="color:#e2e8f0;font-size:12px;font-weight:700;">Qhunu Agent Office</span>
    <span style="background:#141e30;border:1px solid #1e3050;border-radius:3px;padding:1px 6px;font-size:9px;color:#60a5fa;">pool.qhunu.com</span>
    <span style="background:#0f1e10;border:1px solid #1a4020;border-radius:3px;padding:1px 6px;font-size:9px;color:#22c55e;">LIVE</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="em" style="color:#fbbf24;font-size:9px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <span id="ck" style="color:#445060;font-size:9px;font-family:monospace;background:#12121e;border:1px solid #1e1e35;border-radius:3px;padding:2px 5px;"></span>
  </div>
</div>
<div id="main">
  <div id="cw"><canvas id="c"></canvas></div>
  <div id="side">
    <div class="s" style="flex:1;overflow-y:auto;"><div class="st">7 Agentes</div><div id="al"></div></div>
    <div class="s">
      <div class="st">Costos</div>
      <div class="mr"><span class="ml">Total hoy</span><span class="mv" style="color:#22c55e;">$0.0018</span></div>
      <div class="mr"><span class="ml">Tokens</span><span class="mv" style="color:#f59e0b;" id="tk">6,240</span></div>
      <div class="mr"><span class="ml">Ahorro FinOps</span><span class="mv" style="color:#22c55e;">$2,840/mes</span></div>
    </div>
    <div class="s">
      <div class="st">Benchmark</div>
      <div class="mr"><span class="ml">vs Datadog</span><span class="mv" style="color:#22c55e;">-40%</span></div>
      <div class="mr"><span class="ml">vs PagerDuty</span><span class="mv" style="color:#22c55e;">-65%</span></div>
      <div class="mr"><span class="ml">MTTR Atlas</span><span class="mv" style="color:#60a5fa;">~2 min</span></div>
    </div>
    <div class="s">
      <div class="st">Sistema</div>
      <div class="mr"><span class="ml">CPU</span><div style="flex:1;margin:0 4px;background:#14142a;height:4px;border-radius:2px;"><div id="cb" style="height:4px;background:#22c55e;border-radius:2px;width:12%;transition:width .5s;"></div></div><span class="mv" id="cv" style="color:#22c55e;font-size:9px;">12%</span></div>
      <div class="mr"><span class="ml">RAM</span><div style="flex:1;margin:0 4px;background:#14142a;height:4px;border-radius:2px;"><div id="rb" style="height:4px;background:#60a5fa;border-radius:2px;width:58%;transition:width .5s;"></div></div><span class="mv" id="rv" style="color:#60a5fa;font-size:9px;">58%</span></div>
      <div class="mr"><span class="ml">Uptime</span><span class="mv" style="color:#22c55e;">99.9%</span></div>
    </div>
  </div>
</div>
<div id="bot">
  <span style="background:#ef4444;color:#fff;font-size:7px;font-weight:700;padding:2px 5px;border-radius:2px;flex-shrink:0;">LIVE</span>
  <div style="overflow:hidden;flex:1;position:relative;height:14px;"><div id="ti" style="font-size:9px;color:#60a5fa;white-space:nowrap;position:absolute;top:1px;"></div></div>
  <span style="font-size:9px;color:#3a4560;flex-shrink:0;">Ciclo: <b style="color:#c0ccd8;" id="cy">7</b> | <b style="color:#22c55e;">7/7</b></span>
</div>
</div>
<script>
const cv=document.getElementById("c");
const g=cv.getContext("2d");

// Grid: 5 cols x 3 rows, always fills 100% of canvas
const COLS=5,ROWS=3,GAP=4;
let W,H,CW,CH; // canvas width/height
let RW,RH;      // room width/height in real pixels
let RX=[],RY=[]; // room origins

function resize(){
  const wrap=document.getElementById("cw");
  CW=wrap.clientWidth; CH=wrap.clientHeight;
  W=CW; H=CH;
  cv.width=W; cv.height=H;
  RW=Math.floor((W-GAP*(COLS+1))/COLS);
  RH=Math.floor((H-GAP*(ROWS+1))/ROWS);
  for(let i=0;i<COLS;i++) RX[i]=GAP+i*(RW+GAP);
  for(let j=0;j<ROWS;j++) RY[j]=GAP+j*(RH+GAP);
  reposAgents();
}
window.addEventListener("resize",resize);
setTimeout(resize,50);

// ─── DRAW HELPERS (all coords in real canvas pixels) ───
function fr(x,y,w,h,col){g.fillStyle=col;g.fillRect(x,y,w,h);}

// Draw a room at rx,ry with size RW x RH
function drawRoom(rx,ry,wc,ws,fc,fc2){
  // wall top
  fr(rx,ry,RW,Math.round(RH*0.09),wc);
  fr(rx,ry+Math.round(RH*0.09),RW,Math.round(RH*0.02),ws);
  // side walls
  fr(rx,ry,4,RH,ws); fr(rx+RW-4,ry,4,RH,ws);
  // floor
  const fx=rx+4,fy=ry+Math.round(RH*0.11),fw=RW-8,fh=RH-Math.round(RH*0.11)-3;
  const ts=Math.round(Math.min(RW,RH)*0.07);
  for(let ty=fy;ty<fy+fh;ty+=ts) for(let tx=fx;tx<fx+fw;tx+=ts){
    g.fillStyle=((Math.floor((tx-fx)/ts+Math.floor((ty-fy)/ts)))%2===0)?fc:fc2;
    g.fillRect(tx,ty,Math.min(ts,fx+fw-tx),Math.min(ts,fy+fh-ty));
  }
  // bottom wall
  fr(rx,ry+RH-3,RW,3,wc+"cc");
  // inner shadow
  g.fillStyle="rgba(0,0,0,0.1)";g.fillRect(fx,fy,fw,3);g.fillRect(fx,fy,3,fh);
}

// Room-fraction helpers: rf(rx,frac) = rx + frac*RW
function rfx(rx,f){return rx+Math.round(f*RW);}
function rfy(ry,f){return ry+Math.round(f*RH);}
// Size helpers: sw(f)=f*RW, sh(f)=f*RH
function sw(f){return Math.max(1,Math.round(f*RW));}
function sh(f){return Math.max(1,Math.round(f*RH));}

function roomLabel(rx,ry,label,col){
  const tw=label.length*4.4+12;
  g.fillStyle="rgba(6,6,20,0.85)";
  g.beginPath();g.roundRect(rx+RW/2-tw/2,ry+2,tw,12,3);g.fill();
  g.strokeStyle=col;g.lineWidth=1;
  g.beginPath();g.roundRect(rx+RW/2-tw/2,ry+2,tw,12,3);g.stroke();
  g.fillStyle=col;g.font="bold 7px monospace";g.textAlign="center";
  g.fillText(label,rx+RW/2,ry+11);g.textAlign="left";
}

function drawDesk(rx,ry,ox,oy,ac){
  const x=rfx(rx,ox),y=rfy(ry,oy);
  const dw=sw(0.24),dh=sh(0.10);
  g.fillStyle="rgba(0,0,0,0.15)";g.fillRect(x+2,y+dh+2,dw,3);
  fr(x,y,dw,dh,"#c89848");
  g.fillStyle="rgba(0,0,0,0.06)";for(let i=0;i<3;i++)g.fillRect(x,y+2+i*Math.floor(dh/3),dw,1);
  fr(x,y+dh,dw,3,"#a07030");fr(x,y+dh+3,dw,2,"#805020");
  fr(x+1,y+dh+5,4,5,"#603808");fr(x+dw-5,y+dh+5,4,5,"#603808");
  // monitor
  const mw=sw(0.18),mh=sh(0.09),mx=x+sw(0.04),my=y-mh-2;
  fr(mx,my,mw,mh,"#1a1a2a");fr(mx+1,my+1,mw-2,mh-2,"#0a0a14");
  g.fillStyle=ac+"55";g.fillRect(mx+1,my+1,mw-2,mh-2);
  g.fillStyle=ac;g.fillRect(mx+2,my+2,sw(0.07),sh(0.008));g.fillRect(mx+2,my+4,sw(0.10),sh(0.008));g.fillRect(mx+2,my+6,sw(0.08),sh(0.008));
  g.strokeStyle="#2a2a3a";g.lineWidth=1.5;g.strokeRect(mx,my,mw,mh);
  fr(mx+mw/2-3,y-2,6,3,"#2a2a3a");fr(mx+mw/2-6,y,12,2,"#2a2a3a");
  // keyboard
  fr(x+2,y+3,dw-6,sh(0.04),"#2a3a4a");
  g.fillStyle=ac;g.fillRect(x,y,dw,2);
}

function drawChair(rx,ry,ox,oy,col){
  const x=rfx(rx,ox),y=rfy(ry,oy),cw=sw(0.10),ch=sh(0.07);
  g.fillStyle=col+"99";g.fillRect(x,y,cw,ch);
  g.fillStyle=col;g.fillRect(x+1,y+1,cw-2,Math.round(ch*0.7));
  g.fillStyle="rgba(255,255,255,0.15)";g.fillRect(x+2,y+2,Math.round(cw*0.4),Math.round(ch*0.3));
  g.fillStyle=col+"88";g.fillRect(x,y-Math.round(ch*0.6),cw,Math.round(ch*0.65));
  g.fillStyle="rgba(0,0,0,0.2)";g.fillRect(x,y+Math.round(ch*0.75),cw,Math.round(ch*0.3));
}

function drawBookshelf(rx,ry,ox,oy){
  const x=rfx(rx,ox),y=rfy(ry,oy),bw=sw(0.15),bh=sh(0.18);
  fr(x,y,bw,bh,"#8a6848");fr(x+1,y+1,bw-2,bh-2,"#6a4828");
  const shelves=3;
  for(let s=0;s<shelves;s++) fr(x+1,y+Math.round(bh*(s+1)/(shelves+1)),bw-2,1,"#7a5838");
  const bks=["#3b82f6","#ef4444","#22c55e","#f59e0b","#a78bfa","#ec4899","#06b6d4","#84cc16"];
  const bkw=Math.max(3,Math.round((bw-4)/3));
  bks.forEach((bc,i)=>{
    const row=Math.floor(i/3),col=i%3;
    const bx=x+2+col*bkw,by=y+2+row*Math.round(bh*0.32);
    g.fillStyle=bc;g.fillRect(bx,by,bkw-1,Math.round(bh*0.28));
    g.fillStyle="rgba(255,255,255,0.2)";g.fillRect(bx,by,1,Math.round(bh*0.28));
  });
}

function drawPlant(rx,ry,ox,oy,t){
  const x=rfx(rx,ox),y=rfy(ry,oy);
  const pw=sw(0.06),ph=sh(0.05);
  const sw2=Math.sin(t*0.6)*1;
  fr(x-pw/2,y,pw,ph,"#8a3a1a");fr(x-pw/2-1,y-1,pw+2,3,"#6a2a0a");
  g.fillStyle="#3a8a2a";g.fillRect(x-1,y-sh(0.06),2,sh(0.07));
  g.fillStyle="#2a7a1a";g.save();g.translate(x,y-sh(0.03));g.rotate(-0.6+sw2*0.04);g.fillRect(-sw(0.06),0,sw(0.06),sh(0.025));g.restore();
  g.fillStyle="#3a9a2a";g.save();g.translate(x,y-sh(0.04));g.rotate(0.5+sw2*0.04);g.fillRect(0,0,sw(0.06),sh(0.025));g.restore();
  g.fillStyle="#2a6a1a";g.save();g.translate(x,y-sh(0.08));g.rotate(sw2*0.04);g.beginPath();g.ellipse(0,0,sw(0.04),sh(0.05),0,0,Math.PI*2);g.fill();g.restore();
}

function drawSofa(rx,ry,ox,oy){
  const x=rfx(rx,ox),y=rfy(ry,oy),sw2=sw(0.48),sh2=sh(0.16);
  fr(x,y,sw2,sh2*0.45,"#e07030");fr(x+1,y+1,sw2-2,sh2*0.3,"#f09050");
  g.fillStyle="rgba(255,255,255,0.1)";g.fillRect(x+1,y+1,sw2/2,sh2*0.12);
  fr(x-sw(0.03),y,sw(0.05),sh2,"#e07030");fr(x+sw2-sw(0.02),y,sw(0.05),sh2,"#e07030");
  fr(x,y+sh2*0.45,sw2,sh2*0.55,"#f09050");
  fr(x+1,y+sh2*0.48,sw2/2-2,sh2*0.45,"#e8844a");fr(x+sw2/2+1,y+sh2*0.48,sw2/2-2,sh2*0.45,"#e8844a");
  fr(x+sw2/2-1,y+sh2*0.45,2,sh2*0.55,"#c06020");
  fr(x+sw2*0.25,y+sh2*0.06,sw2*0.2,sh2*0.32,"#f0d070");
}

function drawTV(rx,ry,ox,oy,t){
  const x=rfx(rx,ox),y=rfy(ry,oy),tw=sw(0.3),th=sh(0.14);
  fr(x,y,tw,th,"#1a1a2a");fr(x+1,y+1,tw-2,th-4,"#1e3a5f");
  g.fillStyle="#3b82f6";g.font="bold "+Math.round(sh(0.04))+"px monospace";g.fillText("QHUNU",x+4,y+Math.round(th*0.5));
  g.fillStyle="#60a5fa";g.font=Math.round(sh(0.028))+"px monospace";g.fillText("LIVE",x+4,y+Math.round(th*0.75));
  if(Math.sin(t*3)>0){fr(x+tw-8,y+3,5,4,"#22c55e");}
  fr(x+tw/2-4,y+th,6,4,"#2a2a3a");fr(x+tw/2-8,y+th+3,16,2,"#2a2a3a");
}

function drawServerRack(rx,ry,ox,oy,t){
  const x=rfx(rx,ox),y=rfy(ry,oy),rw2=sw(0.13),rh2=sh(0.22);
  fr(x,y,rw2,rh2,"#1a2a3a");fr(x+1,y+1,rw2-2,rh2-2,"#0a1a28");
  const slots=5,sh3=Math.floor((rh2-4)/slots);
  for(let s=0;s<slots;s++){
    fr(x+2,y+2+s*sh3,rw2-4,sh3-1,"#1e3a4a");
    g.fillStyle=s===1?"#ef4444":(Math.sin(t*3+s*1.5)>0?"#22c55e":"#1a3a1a");
    g.beginPath();g.arc(x+5,y+4+s*sh3+sh3/2,2,0,Math.PI*2);g.fill();
    fr(x+9,y+3+s*sh3,rw2-12,sh3-2,"#2a4a5a");
  }
}

function drawCoffee(rx,ry,ox,oy,t){
  const x=rfx(rx,ox),y=rfy(ry,oy),cw=sw(0.14),ch=sh(0.15);
  fr(x,y,cw,ch,"#1a1208");fr(x+1,y+1,cw-2,ch-2,"#0d0908");
  fr(x+2,y+2,cw-4,sh(0.05),"#0a2a1a");
  g.fillStyle="#00ff88";g.font=Math.round(sh(0.025))+"px monospace";g.fillText("READY",x+3,y+sh(0.045));
  fr(x+cw/2-4,y+ch*0.55,8,6,"#3a2a1a");
  const sa=(Math.sin(t*3)+1)/2;
  g.fillStyle="rgba(200,200,200,"+sa*0.5+")";g.fillRect(x+cw*0.4,y-8,2,8);g.fillRect(x+cw*0.6,y-10,2,10);
  g.fillStyle="#ef4444";g.beginPath();g.arc(x+cw*0.2,y+ch*0.85,2.5,0,Math.PI*2);g.fill();
  g.fillStyle="#22c55e";g.beginPath();g.arc(x+cw*0.5,y+ch*0.85,2.5,0,Math.PI*2);g.fill();
  g.fillStyle="#3b82f6";g.beginPath();g.arc(x+cw*0.8,y+ch*0.85,2.5,0,Math.PI*2);g.fill();
  fr(x+2,y+ch,cw-4,8,"#fff");fr(x+3,y+ch+2,cw-6,5,"#a08060");
}

function drawWB(rx,ry,ox,oy,lines,fc){
  const x=rfx(rx,ox),y=rfy(ry,oy),wbw=sw(0.55),wbh=sh(0.28);
  fr(x,y,wbw,wbh,fc);fr(x+2,y+2,wbw-4,wbh-4,"#0a1808");
  g.font=Math.round(sh(0.03))+"px monospace";
  lines.forEach((l,i)=>{g.fillStyle=i===0?"#6ee7b7":i%2===0?"#34d399":"#10b981";g.fillText(l,x+3,y+sh(0.048)+i*sh(0.044));});
  fr(x+2,y+wbh-4,wbw-4,3,"#1a3a18");
  ["#ef4444","#3b82f6","#22c55e","#f59e0b","#a78bfa"].forEach((col,i)=>{g.fillStyle=col;g.fillRect(x+3+i*Math.round((wbw-6)/5),y+wbh-2,Math.round((wbw-6)/5)-1,2);});
}

function drawMeetingTable(rx,ry){
  const cx=rfx(rx,0.5),cy=rfy(ry,0.62),tw=sw(0.4),th=sh(0.12);
  g.fillStyle="#c89848";g.beginPath();g.ellipse(cx,cy,tw,th,0,0,Math.PI*2);g.fill();
  g.fillStyle="#a87828";g.beginPath();g.ellipse(cx,cy+sh(0.02),tw,th*0.35,0,0,Math.PI);g.fill();
  g.strokeStyle="#805020";g.lineWidth=1;g.beginPath();g.ellipse(cx,cy,tw,th,0,0,Math.PI*2);g.stroke();
  const chairs=[[-0.38,-0.06],[-0.22,-0.1],[0,-0.12],[0.22,-0.1],[0.38,-0.06],[-0.38,0.06],[-0.22,0.1],[0,0.12],[0.22,0.1],[0.38,0.06]];
  chairs.forEach(([fx,fy])=>{
    const cx2=rfx(rx,0.5+fx),cy2=rfy(ry,0.62+fy);
    g.fillStyle="#2a5aaa";g.fillRect(cx2-sw(0.04),cy2-sh(0.03),sw(0.08),sh(0.06));
    g.fillStyle="#1d4ed8";g.fillRect(cx2-sw(0.03),cy2-sh(0.03),sw(0.06),sh(0.04));
  });
  g.fillStyle="#1a1a2a";g.fillRect(cx-sw(0.08),cy-sh(0.04),sw(0.16),sh(0.08));
  g.fillStyle="#1e3a5f";g.fillRect(cx-sw(0.07),cy-sh(0.035),sw(0.14),sh(0.07));
  g.fillStyle="#60a5fa";g.font="bold "+Math.round(sh(0.03))+"px monospace";g.textAlign="center";g.fillText("SPRINT 7",cx,cy+sh(0.012));g.textAlign="left";
}

function drawPingPong(rx,ry,ox,oy){
  const x=rfx(rx,ox),y=rfy(ry,oy),pw=sw(0.4),ph=sh(0.15);
  fr(x,y,pw,ph,"#166534");fr(x+1,y+1,pw-2,ph-2,"#15803d");
  fr(x+pw/2-1,y,3,ph,"#e2e8f0");fr(x,y+ph/2-1,pw,2,"#e2e8f0");
  const bx=x+pw*0.25+Math.sin(Date.now()*0.003)*pw*0.2;
  const by=y+ph*0.25+Math.abs(Math.sin(Date.now()*0.006))*ph*0.4;
  g.fillStyle="#f97316";g.beginPath();g.arc(bx,by,3,0,Math.PI*2);g.fill();
  fr(x+4,y+ph/2-4,sw(0.04),sh(0.04),"#ef4444");
  fr(x+pw-sw(0.05),y+ph/2-4,sw(0.04),sh(0.04),"#3b82f6");
}

function drawArcade(rx,ry,ox,oy,t){
  const x=rfx(rx,ox),y=rfy(ry,oy),aw=sw(0.12),ah=sh(0.18);
  fr(x,y,aw,ah,"#1a0a2a");fr(x+1,y+1,aw-2,sh(0.1),"#2a1a3a");
  const cols=["#ef4444","#3b82f6","#22c55e","#f59e0b"];
  for(let r=0;r<3;r++) for(let ci=0;ci<4;ci++){
    g.fillStyle=(Math.sin(t*5+r+ci)>0.3)?cols[ci]:"#1a0a2a";
    g.fillRect(x+2+ci*Math.floor((aw-4)/4),y+2+r*Math.floor(sh(0.1)/3),Math.floor((aw-4)/4)-1,Math.floor(sh(0.1)/3)-1);
  }
  g.fillStyle="#fbbf24";g.beginPath();g.arc(x+aw*0.3,y+ah*0.72,3,0,Math.PI*2);g.fill();
  g.fillStyle="#ef4444";g.beginPath();g.arc(x+aw*0.7,y+ah*0.72,3,0,Math.PI*2);g.fill();
}

function drawPoolTable(rx,ry,ox,oy){
  const x=rfx(rx,ox),y=rfy(ry,oy),pw=sw(0.38),ph=sh(0.13);

function drawSprite(ax,ay,bC,sk,bob,wp,st,badge){
  const sz=Math.round(Math.min(RW,RH)*0.08); // sprite scale unit
  const bx=ax,by=ay+bob;
  // shadow
  g.save();g.globalAlpha=0.2;g.fillStyle="#000";
  g.beginPath();g.ellipse(bx,by+sz*2.2,sz*1.1,sz*0.35,0,0,Math.PI*2);g.fill();g.restore();
  const la=st==="walking"?Math.sin(wp)*sz*0.6:0;
  const as=st==="working"?Math.sin(wp*2.5)*sz*0.8:(st==="walking"?la*0.7:0);
  // legs
  g.fillStyle=bC+"cc";
  g.fillRect(bx-sz*0.5,by+sz*0.9,sz*0.45,sz*1.1+la);
  g.fillRect(bx+sz*0.1,by+sz*0.9,sz*0.45,sz*1.1-la);
  // shoes
  g.fillStyle="#1a1a28";
  g.fillRect(bx-sz*0.6,by+sz*1.9+la,sz*0.55,sz*0.3);
  g.fillRect(bx+sz*0.1,by+sz*1.9-la,sz*0.55,sz*0.3);
  // body
  g.fillStyle=bC;g.fillRect(bx-sz*0.8,by-sz*0.5,sz*1.6,sz*1.4);
  g.fillStyle="rgba(255,255,255,0.13)";g.fillRect(bx-sz*0.8,by-sz*0.5,sz*1.6,sz*0.4);
  g.fillStyle="rgba(0,0,0,0.2)";g.fillRect(bx-sz*0.8,by+sz*0.5,sz*1.6,sz*0.4);
  // arms
  g.fillStyle=bC;
  g.fillRect(bx-sz*1.3,by-sz*0.3,sz*0.5,sz*1.1+as);g.fillStyle=sk;g.fillRect(bx-sz*1.3,by+sz*0.7+as,sz*0.5,sz*0.4);
  g.fillStyle=bC;
  g.fillRect(bx+sz*0.8,by-sz*0.3,sz*0.5,sz*1.1-as);g.fillStyle=sk;g.fillRect(bx+sz*0.8,by+sz*0.7-as,sz*0.5,sz*0.4);
  // head
  g.fillStyle=sk;g.fillRect(bx-sz*0.9,by-sz*2.1,sz*1.8,sz*1.6);
  g.fillStyle=bC;
  g.fillRect(bx-sz*0.9,by-sz*2.1,sz*1.8,sz*0.45);
  g.fillRect(bx-sz*0.9,by-sz*2.1,sz*0.3,sz*1.0);
  g.fillRect(bx+sz*0.6,by-sz*2.1,sz*0.3,sz*1.0);
  // eyes
  g.fillStyle="#fff";g.fillRect(bx-sz*0.6,by-sz*1.6,sz*0.5,sz*0.5);g.fillRect(bx+sz*0.1,by-sz*1.6,sz*0.5,sz*0.5);
  g.fillStyle="#1a1a2e";
  if(st==="alert"||st==="healing"){g.fillRect(bx-sz*0.5,by-sz*1.5,sz*0.3,sz*0.3);g.fillRect(bx+sz*0.2,by-sz*1.5,sz*0.3,sz*0.3);}
  else{g.fillRect(bx-sz*0.5,by-sz*1.5,sz*0.3,sz*0.4);g.fillRect(bx+sz*0.2,by-sz*1.5,sz*0.3,sz*0.4);}
  g.fillStyle="rgba(255,255,255,0.85)";g.fillRect(bx-sz*0.5,by-sz*1.6,sz*0.15,sz*0.15);g.fillRect(bx+sz*0.2,by-sz*1.6,sz*0.15,sz*0.15);
  g.fillStyle=bC+"dd";g.fillRect(bx-sz*0.6,by-sz*1.75,sz*0.5,sz*0.15);g.fillRect(bx+sz*0.1,by-sz*1.75,sz*0.5,sz*0.15);
  if(st==="alert"||st==="healing"){g.fillStyle="#ef4444";g.fillRect(bx-sz*0.3,by-sz*0.95,sz*0.5,sz*0.15);}
  else if(st==="resting"||st==="cafe"){g.fillStyle="#c08060";g.fillRect(bx-sz*0.3,by-sz*0.95,sz*0.5,sz*0.25);}
  else{g.fillStyle="#c08060";g.fillRect(bx-sz*0.3,by-sz*0.95,sz*0.5,sz*0.15);g.fillRect(bx-sz*0.4,by-sz*0.82,sz*0.15,sz*0.15);g.fillRect(bx+sz*0.2,by-sz*0.82,sz*0.15,sz*0.15);}
  // badge
  if(badge==="crown"){
    g.fillStyle="#f59e0b";
    g.fillRect(bx-sz*0.8,by-sz*2.6,sz*0.35,sz*0.55);g.fillRect(bx-sz*0.25,by-sz*2.9,sz*0.45,sz*0.8);g.fillRect(bx+sz*0.4,by-sz*2.6,sz*0.35,sz*0.55);
    g.fillRect(bx-sz*0.9,by-sz*2.45,sz*1.8,sz*0.25);
    g.fillStyle="#ef4444";g.fillRect(bx-sz*0.7,by-sz*2.7,sz*0.25,sz*0.25);
    g.fillStyle="#3b82f6";g.fillRect(bx-sz*0.15,by-sz*3.0,sz*0.3,sz*0.25);
    g.fillStyle="#22c55e";g.fillRect(bx+sz*0.4,by-sz*2.7,sz*0.25,sz*0.25);
  }else if(badge==="shield"){
    g.fillStyle="#60a5fa";g.fillRect(bx+sz*0.6,by-sz*2.7,sz*0.9,sz*0.9);
    g.fillStyle="#1d4ed8";g.beginPath();g.moveTo(bx+sz*1.05,by-sz*1.9);g.lineTo(bx+sz*0.6,by-sz*2.65);g.lineTo(bx+sz*1.5,by-sz*2.65);g.closePath();g.fill();
    g.fillStyle="#fff";g.font="bold "+Math.round(sz*0.55)+"px monospace";g.fillText("V",bx+sz*0.8,by-sz*2.1);
  }else if(badge==="wrench"){
    g.fillStyle="#94a3b8";g.fillRect(bx+sz*0.6,by-sz*2.7,sz*0.4,sz*1.1);
    g.fillStyle="#64748b";g.fillRect(bx+sz*0.4,by-sz*2.8,sz*0.8,sz*0.35);g.fillRect(bx+sz*0.4,by-sz*1.8,sz*0.8,sz*0.3);
  }else if(badge==="coin"){
    g.fillStyle="#fbbf24";g.beginPath();g.arc(bx+sz*0.9,by-sz*2.4,sz*0.5,0,Math.PI*2);g.fill();
    g.fillStyle="#f59e0b";g.beginPath();g.arc(bx+sz*0.9,by-sz*2.4,sz*0.35,0,Math.PI*2);g.fill();
    g.fillStyle="#fff";g.font="bold "+Math.round(sz*0.5)+"px monospace";g.fillText("$",bx+sz*0.65,by-sz*2.2);
  }else if(badge==="eye"){
    g.strokeStyle="#a78bfa";g.lineWidth=1.5;g.beginPath();g.arc(bx+sz*0.9,by-sz*2.4,sz*0.45,0,Math.PI*2);g.stroke();
    g.strokeStyle="#a78bfa";g.lineWidth=2;g.beginPath();g.moveTo(bx+sz*1.3,by-sz*2.0);g.lineTo(bx+sz*1.7,by-sz*1.6);g.stroke();
  }else if(badge==="pen"){
    g.fillStyle="#fde68a";g.fillRect(bx+sz*0.6,by-sz*2.8,sz*0.3,sz*1.0);
    g.fillStyle="#f59e0b";g.fillRect(bx+sz*0.6,by-sz*2.8,sz*0.3,sz*0.3);
    g.fillStyle="#1a1a28";g.fillRect(bx+sz*0.6,by-sz*1.85,sz*0.3,sz*0.2);
    g.fillStyle="#fca5a5";g.beginPath();g.moveTo(bx+sz*0.6,by-sz*1.65);g.lineTo(bx+sz*1.2,by-sz*1.65);g.lineTo(bx+sz*0.9,by-sz*1.35);g.fill();
  }
  if(st==="supervising"){
    g.save();g.globalAlpha=0.3;g.strokeStyle="#fbbf24";g.lineWidth=1.5;g.setLineDash([2,2]);
    g.beginPath();g.arc(bx,by,sz*2,0,Math.PI*2);g.stroke();g.setLineDash([]);g.restore();
  }
}

function drawNameTag(ag){
  const sz=Math.round(Math.min(RW,RH)*0.08);
  const bx=ag.x,by=ag.y+ag.bob;
  const nw=ag.name.length*5+18;
  const nx=bx-nw/2,ny=by-sz*2.8;
  g.fillStyle="rgba(0,0,0,0.87)";g.beginPath();g.roundRect(nx,ny,nw,14,3);g.fill();
  g.strokeStyle=ag.color;g.lineWidth=ag.badge==="crown"?1.5:1;g.beginPath();g.roundRect(nx,ny,nw,14,3);g.stroke();
  g.fillStyle="#22c55e";g.beginPath();g.arc(nx+5,ny+7,3,0,Math.PI*2);g.fill();
  g.fillStyle=ag.badge==="crown"?"#fde68a":"#e2e8f0";g.font="bold 7px monospace";g.textAlign="center";g.fillText(ag.name,bx+2,ny+10);g.textAlign="left";
  if(ag.bubble&&ag.bt>0){
    const bw=Math.min(ag.bubble.length*5+14,155);
    const bbx=Math.max(4,Math.min(bx-bw/2,W-bw-4));
    const bby=by-sz*3.8;
    g.fillStyle=ag.badge==="crown"?"rgba(28,18,0,0.94)":"rgba(12,36,70,0.94)";
    g.strokeStyle=ag.color;g.lineWidth=ag.badge==="crown"?1.5:1.2;
    g.beginPath();g.roundRect(bbx,bby,bw,15,3);g.fill();g.stroke();
    g.beginPath();g.moveTo(bx-3,bby+15);g.lineTo(bx,bby+21);g.lineTo(bx+3,bby+15);
    g.fillStyle=ag.badge==="crown"?"rgba(28,18,0,0.94)":"rgba(12,36,70,0.94)";g.fill();g.strokeStyle=ag.color;g.stroke();
    g.fillStyle=ag.badge==="crown"?"#fde68a":"#e2e8f0";g.font="bold 7px monospace";g.textAlign="center";g.fillText(ag.bubble,bbx+bw/2,bby+10);g.textAlign="left";
    ag.bt--;
  }
}

function agHome(ag){return {x:RX[ag.rc]+Math.round(ag.fx*RW),y:RY[ag.rr]+Math.round(ag.fy*RH)};}
function reposAgents(){AG.forEach(ag=>{const h=agHome(ag);if(ag.x===0||ag.state==="working"){ag.x=h.x;ag.y=h.y;ag.tx=h.x;ag.ty=h.y;}});}

function goto(ag,x,y,n){ag.tx=x;ag.ty=y;ag.state="walking";ag._n=n||"working";}
function say(ag,m,t){ag.bubble=m;ag.bt=t||105;}
function moveAG(ag){
  const dx=ag.tx-ag.x,dy=ag.ty-ag.y,d=Math.sqrt(dx*dx+dy*dy);
  if(d>1.5){ag.x+=dx/d*1.8;ag.y+=dy/d*1.8;ag.wp+=0.22;}
  else{ag.x=ag.tx;ag.y=ag.ty;if(ag.state==="walking")ag.state=ag._n;ag.wp*=0.9;}
